name: Frappe Cloud Marketplace Reconciliation

# Each Monday, scrape FC marketplace and open / update a sticky PR that
# adds any apps not yet listed in README.md. You review and merge (or
# trim) at your pace. No files committed by the workflow other than the
# README edits in the PR branch.

on:
  schedule:
    - cron: '0 5 * * 1'  # Mondays at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: fc-reconciliation
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Restore FC scrape cache
        uses: actions/cache@v4
        with:
          path: _fc_cache.json
          key: fc-cache-${{ github.run_id }}
          restore-keys: fc-cache-

      - name: Generate README additions + PR body
        run: ruby scripts/fc_reconciliation.rb

      - name: Open / update sticky additions PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          branch: fc-sync/auto-additions
          base: main
          commit-message: |
            docs(fc-sync): Propose FC marketplace apps for inclusion

            Auto-generated by .github/workflows/fc-reconciliation.yml
          title: 'docs(fc-sync): Propose FC marketplace apps for inclusion'
          body-path: /tmp/fc_pr_body.md
          delete-branch: false
          add-paths: README.md
